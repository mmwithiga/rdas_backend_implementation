apiVersion: apps/v1
kind: Deployment
metadata:
  name: rdas
  namespace: rdas
  labels:
    app: rdas
    version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rdas
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0          # Zero-downtime deploys
  template:
    metadata:
      labels:
        app: rdas
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8080"
    spec:
      containers:
        - name: rdas
          image: mmwithiga/rdas:1.0.0   # Replace with your image
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: rdas-config
            - secretRef:
                name: rdas-secrets
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 90    # Allow time for cache warmup
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 3
      terminationGracePeriodSeconds: 60

---
apiVersion: v1
kind: Service
metadata:
  name: rdas-service
  namespace: rdas
spec:
  selector:
    app: rdas
  ports:
    - name: http
      port: 80
      targetPort: 8080
  type: LoadBalancer
